<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - FluxoCapital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            width: 90%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .btn-primary {
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            background: rgb(90, 2, 178);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: rgb(70, 2, 140);
            box-shadow: 0 5px 15px rgba(90, 2, 178, 0.3);
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(90, 2, 178, 0.1);
            border-color: rgb(90, 2, 178);
        }

        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: #64748b;
            border-radius: 10px 0 0 10px;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .hp-field {
            display: none;
        }

        /* Melhorias para Mobile - Ocupa a tela toda */
        @media (max-width: 576px) {
            body {
                background: white;
            }

            .login-card {
                width: 100%;
                height: 100vh;
                max-width: none;
                border-radius: 0;
                box-shadow: none;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 1.5rem;
                background: white;
                backdrop-filter: none;
            }

            .form-control, .input-group-text {
                padding: 18px 20px;
                font-size: 1.3rem;
            }

            .btn-primary {
                padding: 18px;
                font-size: 1.4rem;
                margin-top: 1rem;
            }

            h3 {
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }

            #captcha-img {
                width: 160px;
                height: 60px;
            }
            
            .text-muted {
                margin-top: 2rem !important;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: rgb(90, 2, 178);">FluxoCapital</h3>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} small py-2 text-center">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="hp-field">
                <input type="text" name="email_api" autocomplete="off" tabindex="-1">
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="" required aria-label="Usuário">
                </div>
            </div>
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="" required aria-label="Senha">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Código de Segurança (CAPTCHA)</label>
                <div class="d-flex align-items-center gap-2">
                    <img src="{{ url_for('generate_captcha') }}" alt="Captcha" class="rounded border" id="captcha-img" width="120" height="40" style="image-rendering: -webkit-optimize-contrast;">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('captcha-img').src='{{ url_for('generate_captcha') }}?' + Math.random();" title="Atualizar Captcha">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-clockwise" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                            <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                        </svg>
                    </button>
                    <input type="text" name="captcha" class="form-control" placeholder="Código" required maxlength="3" autocomplete="off">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <div class="mt-4 text-center text-muted small" style="font-size: 0.75rem;">
            &copy; {{ now_year }} FluxoCapital. <span class="badge text-bg-secondary" style="font-size: 0.65rem;">Beta Version</span>
            <br>
            Último Deploy: 18/03/2026 10:58:29
        </div>
    </div>

</body>

</html>
