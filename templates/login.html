<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FluxoCapital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .input-group-text {
            background-color: rgb(90, 2, 178);
            color: white;
            border: none;
            width: 50px;
            justify-content: center;
            border-radius: 10px 0 0 10px;
        }

        .form-control {
            border: 1px solid #dee2e6;
            padding: 12px 15px;
            border-radius: 0 10px 10px 0;
        }
        
        #captcha-input {
            border-radius: 10px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: rgb(90, 2, 178);
        }

        .btn-primary {
            background-color: rgb(90, 2, 178);
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: rgb(70, 2, 140);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(90, 2, 178, 0.3);
        }

        .hp-field {
            display: none;
        }

        /* Responsividade para Celular - Ocupa a tela toda */
        @media (max-width: 576px) {
            body {
                background: white;
            }

            .login-card {
                height: 100vh;
                max-width: none;
                border-radius: 0;
                box-shadow: none;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 2rem;
            }

            .form-control, .input-group-text {
                padding: 18px 20px;
                font-size: 1.25rem;
            }
            
            .input-group-text {
                width: 60px;
            }

            .btn-primary {
                padding: 18px;
                font-size: 1.3rem;
                margin-top: 1rem;
            }

            h3 {
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }

            #captcha-img {
                width: 160px;
                height: 60px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card text-center">
        <div class="mb-4">
            <h3 class="fw-bold" style="color: rgb(90, 2, 178);">FluxoCapital</h3>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} small py-2 text-center border-0 rounded-pill mb-3">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="hp-field">
                <input type="text" name="email_api" autocomplete="off" tabindex="-1">
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Usuário" required aria-label="Usuário">
            </div>

            <div class="input-group mb-4">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Senha" required aria-label="Senha">
            </div>

            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-muted ms-1">Código de Segurança (CAPTCHA)</label>
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <img src="{{ url_for('generate_captcha') }}" id="captcha-img" class="border rounded" alt="CAPTCHA" style="image-rendering: -webkit-optimize-contrast;">
                    <button type="button" class="btn btn-sm btn-link text-decoration-none p-0" tabindex="-1" onclick="document.getElementById('captcha-img').src='{{ url_for('generate_captcha') }}?' + Math.random();">
                        <i class="bi bi-arrow-clockwise"></i> Atualizar
                    </button>
                </div>
                <input type="text" name="captcha" id="captcha-input" class="form-control text-center fw-bold" placeholder="Digite o código" required maxlength="3" style="letter-spacing: 5px;">
            </div>

            <button type="submit" class="btn btn-primary w-100 shadow-sm">Entrar</button>
        </form>

        <div class="mt-5 text-muted tiny" style="font-size: 0.75rem;">
            &copy; {{ now_year }} FluxoCapital. <span class="badge text-bg-secondary" style="font-size: 0.65rem;">Beta Version</span>
            <br>
            Último Deploy: 18/03/2026 11:08:56
        </div>
    </div>

</body>

</html>
