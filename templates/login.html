<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - FluxoCapital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            padding: 10px;
            font-weight: bold;
            border-radius: 8px;
        }

        .hp-field {
            display: none;
        }

        /* Esconde o campo dos humanos */
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: rgb(90, 2, 178);">FluxoCapital</h3>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} small py-2 text-center">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="hp-field">
                <input type="text" name="email_api" autocomplete="off" tabindex="-1">
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Usuário" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="Senha" required>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Código de Segurança (CAPTCHA)</label>
                <div class="d-flex align-items-center gap-2">
                    <img src="{{ url_for('generate_captcha') }}" alt="Captcha" class="rounded border" id="captcha-img" width="120" height="40" style="image-rendering: -webkit-optimize-contrast;">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('captcha-img').src='{{ url_for('generate_captcha') }}?' + Math.random();" title="Atualizar Captcha">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-clockwise" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                            <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                        </svg>
                    </button>
                    <input type="text" name="captcha" class="form-control" placeholder="Código" required maxlength="3" autocomplete="off">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <div class="mt-4 text-center text-muted small" style="font-size: 0.75rem;">
            &copy; {{ now_year }} FluxoCapital. <span class="badge text-bg-secondary" style="font-size: 0.65rem;">Beta
                Version</span>
            <br>
            Último Deploy: {{ ultima_atualizacao }}
        </div>
    </div>

</body>

</html>
