{% extends "base.html" %}

{% block title %}Perfil - FluxoCapital{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white py-2 px-3">
                <h6 class="mb-0"><i class="bi bi-person-circle me-2"></i>Perfil</h6>
            </div>
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <div class="fs-1 text-primary mb-1">
                        <i class="bi bi-person-badge"></i>
                    </div>
                    <h5 class="fw-bold mb-0 text-uppercase">{{ current_user.username }}</h5>
                </div>

                <hr class="my-3 opacity-10">

                <h6 class="fw-bold mb-3 text-muted"><i class="bi bi-shield-lock me-2"></i>Alterar Senha</h6>

                <form method="POST">
                    <div class="mb-2">
                        <label for="senha_atual" class="form-label x-small fw-medium mb-1">Senha Atual</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-key text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 bg-light" id="senha_atual"
                                name="senha_atual" required placeholder="Senha atual">
                        </div>
                    </div>

                    <div class="mb-2">
                        <label for="nova_senha" class="form-label x-small fw-medium mb-1">Nova Senha</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 bg-light" id="nova_senha"
                                name="nova_senha" required placeholder="Mín. 6 caracteres" minlength="6">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmacao" class="form-label x-small fw-medium mb-1">Confirmar Nova Senha</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-lock-fill text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 bg-light" id="confirmacao"
                                name="confirmacao" required placeholder="Repita a nova senha">
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-sm rounded-pill py-2 fw-bold shadow-sm">
                            <i class="bi bi-check2-circle me-1"></i> Atualizar Senha
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-3 text-center">
            <a href="/" class="btn btn-link text-decoration-none text-muted x-small">
                <i class="bi bi-arrow-left me-1"></i> Voltar
            </a>
        </div>
    </div>
</div>

<style>
    .x-small {
        font-size: 0.75rem;
    }
</style>
{% endblock %}
